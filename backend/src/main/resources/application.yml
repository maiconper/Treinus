spring:
  application:
    name: treinus-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:treinus}
    username: ${DB_USER:treinus}
    password: ${DB_PASSWORD:treinus}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long!!}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900} # 15 minutes in seconds
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800} # 7 days in seconds

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

exercisedb:
  api-key: 69935c02b8msh86c09a5af20ca0bp1a1026jsn460e4113326e

logging:
  level:
    com.treinus: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.orm.jdbc.bind]": TRACE
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(---){faint} %clr([%8X{reqId:-?}] [%X{user:-anon}]){yellow} %clr(%-36.36logger{35}){cyan}: %m%n%wEx"
